<!DOCTYPE html>
<html lang="en" data-theme="picnic">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoFi Pomodoro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/theme-picnic.css" id="theme-stylesheet" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <!-- Timer end flash overlay -->
  <div id="flash-overlay" class="flash-overlay" aria-hidden="true"></div>

  <div class="app-shell">

    <!-- Header -->
    <header class="app-header">
      <div class="app-logo">
        <span class="logo-icon">&#9835;</span>
        <span class="logo-text">LoFi Pomo</span>
      </div>
      <div class="header-controls">
        <button class="btn-icon" id="btn-theme" title="Switch theme" aria-label="Switch theme">&#9681;</button>
        <button class="btn-icon" id="btn-settings" title="Settings (,)" aria-label="Open settings">&#9881;</button>
      </div>
    </header>

    <!-- Main content -->
    <main class="app-main">

      <!-- Timer section -->
      <section class="timer-section">
        <!-- Mode tabs -->
        <div class="mode-tabs" role="tablist" aria-label="Timer modes">
          <button class="mode-tab active" data-mode="focus" role="tab" aria-selected="true">Focus</button>
          <button class="mode-tab" data-mode="short" role="tab" aria-selected="false">Short Break</button>
          <button class="mode-tab" data-mode="long" role="tab" aria-selected="false">Long Break</button>
        </div>

        <!-- Timer face -->
        <div class="timer-face" id="timer-face">
          <svg class="timer-ring" viewBox="0 0 220 220" aria-hidden="true">
            <circle class="ring-track" cx="110" cy="110" r="96" />
            <circle class="ring-progress" id="ring-progress" cx="110" cy="110" r="96" />
          </svg>
          <div class="timer-display">
            <span class="timer-digits" id="timer-digits">25:00</span>
            <span class="timer-phase-label" id="timer-phase-label">Focus</span>
          </div>
        </div>

        <!-- Timer controls -->
        <div class="timer-controls">
          <button class="btn-secondary btn-sm" id="btn-reset" title="Reset (R)" aria-label="Reset timer">Reset</button>
          <button class="btn-primary btn-lg" id="btn-start" title="Start/Pause (Space)" aria-label="Start timer">Start</button>
          <button class="btn-secondary btn-sm" id="btn-skip" aria-label="Skip to next phase">Skip</button>
        </div>

        <!-- Session dots -->
        <div class="session-dots" id="session-dots" aria-label="Sessions completed" role="status">
          <!-- rendered by sessions.js -->
        </div>

        <!-- Task input -->
        <div class="task-input-area">
          <input
            type="text"
            id="task-input"
            class="task-input"
            placeholder="What are you working on?"
            maxlength="80"
            autocomplete="off"
            aria-label="Current task"
          />
        </div>
      </section>

      <!-- Audio section -->
      <section class="audio-section">

        <!-- Audio mode switcher -->
        <div class="audio-mode-bar">
          <span class="audio-mode-label">Audio</span>
          <div class="segmented-control" role="group" aria-label="Audio mode">
            <button class="seg-btn active" data-audio-mode="radio">Radio</button>
            <button class="seg-btn" data-audio-mode="ambient">Ambient</button>
            <button class="seg-btn" data-audio-mode="both">Both</button>
          </div>
          <label class="toggle-label" title="Play music only during focus sessions">
            <input type="checkbox" id="focus-only-toggle" aria-label="Music only during focus" />
            <span class="toggle-track"></span>
            <span class="toggle-text">Focus only</span>
          </label>
        </div>

        <!-- Radio panel -->
        <div class="audio-panel" id="radio-panel">
          <div class="panel-header">
            <span class="panel-title">Radio</span>
            <div class="radio-transport">
              <button class="btn-icon" id="btn-prev-station" title="Previous station (←)" aria-label="Previous station">&#9664;</button>
              <button class="btn-icon btn-play-radio" id="btn-play-radio" title="Play/Pause" aria-label="Play radio">&#9654;</button>
              <button class="btn-icon" id="btn-next-station" title="Next station (→)" aria-label="Next station">&#9654;&#9654;</button>
            </div>
          </div>

          <!-- Station cards -->
          <div class="station-list" id="station-list" role="listbox" aria-label="Radio stations">
            <!-- rendered by radio.js -->
          </div>

          <!-- Radio volume -->
          <div class="volume-row">
            <span class="volume-icon" aria-hidden="true">&#9834;</span>
            <input type="range" class="volume-slider" id="radio-volume" min="0" max="100" value="70" aria-label="Radio volume" />
            <span class="volume-value" id="radio-volume-value">70%</span>
          </div>

          <!-- YouTube iframe (hidden fallback) -->
          <div id="yt-container" class="yt-container" style="display:none">
            <iframe
              id="yt-iframe"
              width="0"
              height="0"
              frameborder="0"
              allow="autoplay"
              title="Radio fallback"
              tabindex="-1"
              aria-hidden="true"
            ></iframe>
          </div>

          <!-- Stream status -->
          <div class="stream-status" id="stream-status" role="status" aria-live="polite"></div>
        </div>

        <!-- Ambient panel -->
        <div class="audio-panel hidden" id="ambient-panel">
          <div class="panel-header">
            <span class="panel-title">Ambient</span>
            <div class="volume-row">
              <span class="volume-icon" aria-hidden="true">&#127926;</span>
              <input type="range" class="volume-slider" id="ambient-master-volume" min="0" max="100" value="50" aria-label="Ambient master volume" />
              <span class="volume-value" id="ambient-master-value">50%</span>
            </div>
          </div>
          <div class="ambient-tracks" id="ambient-tracks" role="list">
            <!-- rendered by ambient.js -->
          </div>
        </div>

      </section>

      <!-- Task log -->
      <section class="task-log-section" id="task-log-section">
        <div class="section-header">
          <span class="section-title">Session Log</span>
          <button class="btn-text" id="btn-clear-log" aria-label="Clear all sessions">Clear all</button>
        </div>
        <ul class="task-log" id="task-log" role="list" aria-label="Session log" aria-live="polite">
          <!-- rendered by tasks.js -->
        </ul>
        <p class="task-log-empty" id="task-log-empty">No sessions yet. Start a focus session to begin.</p>
      </section>

    </main>
  </div>

  <!-- Settings panel (side drawer) -->
  <div class="settings-backdrop" id="settings-backdrop" aria-hidden="true"></div>
  <aside class="settings-panel" id="settings-panel" role="dialog" aria-modal="true" aria-label="Settings" aria-hidden="true">
    <div class="settings-header">
      <h2 class="settings-title">Settings</h2>
      <button class="btn-icon" id="btn-close-settings" aria-label="Close settings">&#10005;</button>
    </div>

    <div class="settings-body">

      <fieldset class="settings-group">
        <legend>Timer (minutes)</legend>
        <label class="settings-row">
          <span>Focus</span>
          <input type="number" id="s-focus" min="1" max="90" value="25" class="settings-input" />
        </label>
        <label class="settings-row">
          <span>Short Break</span>
          <input type="number" id="s-short" min="1" max="30" value="5" class="settings-input" />
        </label>
        <label class="settings-row">
          <span>Long Break</span>
          <input type="number" id="s-long" min="1" max="60" value="15" class="settings-input" />
        </label>
        <label class="settings-row">
          <span>Long break after</span>
          <input type="number" id="s-interval" min="2" max="10" value="4" class="settings-input" />
          <span class="settings-unit">sessions</span>
        </label>
        <label class="settings-row settings-toggle-row">
          <span>Auto-advance phases</span>
          <label class="toggle-label">
            <input type="checkbox" id="s-auto-advance" />
            <span class="toggle-track"></span>
          </label>
        </label>
      </fieldset>

      <fieldset class="settings-group">
        <legend>Sound</legend>
        <label class="settings-row">
          <span>Chime volume</span>
          <input type="range" id="s-chime-volume" min="0" max="100" value="60" class="volume-slider" />
          <span class="volume-value" id="s-chime-value">60%</span>
        </label>
      </fieldset>

      <fieldset class="settings-group">
        <legend>Appearance</legend>
        <label class="settings-row">
          <span>Theme</span>
          <select id="s-theme" class="settings-select">
            <option value="picnic">Late Spring Picnic</option>
          </select>
        </label>
      </fieldset>

      <div class="settings-footer">
        <button class="btn-secondary" id="btn-reset-settings">Reset to defaults</button>
      </div>

    </div>
  </aside>

  <script type="module" src="js/app.js"></script>
</body>
</html>
